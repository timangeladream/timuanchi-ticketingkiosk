<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>叫號系統｜店員</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root {
    --gold: #C9A84C; --dark: #1A1A18; --surface: #242420; --surface2: #2E2E2A;
    --border: rgba(201,168,76,0.18); --text: #F0EDE6; --text-sub: #9A9488; --text-dim: #5A574F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

  .overlay { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-label { font-size: 13px; color: var(--text-sub); letter-spacing: 0.06em; }

  #login-screen { padding: 40px 24px; display: none; }
  .login-logo { text-align: center; margin-bottom: 40px; }
  .login-logo-text { font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; }
  .login-logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; margin-top: 4px; }
  .login-field { margin-bottom: 14px; }
  .login-field label { display: block; font-size: 11px; color: var(--text-sub); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .login-field input { width: 100%; font-size: 15px; border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; background: var(--surface); color: var(--text); font-family: inherit; }
  .login-field input:focus { outline: none; border-color: var(--gold); }
  .login-btn { width: 100%; padding: 15px; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; background: var(--gold); color: var(--dark); border: none; margin-top: 8px; }
  .login-btn:active { background: #b8933e; }
  .login-error { font-size: 13px; color: #e05c4f; text-align: center; margin-top: 12px; min-height: 20px; }
  .forgot-link { display: block; text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 16px; cursor: pointer; text-decoration: underline; }

  #main-app { display: none; }
  .user-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .user-email { font-size: 11px; color: var(--text-dim); }
  .logout-btn { font-size: 11px; color: var(--text-sub); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit; }

  .nav { display: flex; border-bottom: 1px solid var(--border); background: var(--dark); position: sticky; top: 0; z-index: 10; }
  .nav-btn { flex: 1; padding: 14px 2px 12px; font-size: 11px; font-family: inherit; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-sub); cursor: pointer; letter-spacing: 0.04em; transition: color 0.2s, border-color 0.2s; }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }

  .page { display: none; padding: 20px 16px 40px; }
  .page.active { display: block; }
  .section-label { font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .hero { text-align: center; padding: 28px 0 20px; }
  .hero-eyebrow { font-size: 11px; letter-spacing: 0.16em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .hero-num { font-size: 80px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: 0.06em; text-shadow: 0 0 40px rgba(201,168,76,0.15); }
  .hero-sub { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .stat.clickable { cursor: pointer; transition: border-color 0.15s; }
  .stat.clickable:active { border-color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--text-sub); margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-hint { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  .btn { width: 100%; padding: 15px; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); margin-bottom: 10px; letter-spacing: 0.04em; transition: background 0.15s; }
  .btn:active { background: var(--surface2); }
  .btn-gold { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 700; }
  .btn-gold:active { background: #b8933e; }
  .btn-danger { border-color: rgba(192,57,43,0.4); color: #e05c4f; }
  .btn-danger:active { background: rgba(192,57,43,0.1); }

  .queue-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .queue-item-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .queue-badge { font-size: 13px; font-weight: 700; color: var(--gold); min-width: 60px; letter-spacing: 0.06em; }
  .queue-svc { font-size: 13px; color: var(--text); flex: 1; }
  .status-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; border-radius: 4px; padding: 2px 7px; white-space: nowrap; }
  .status-waiting  { background: rgba(90,87,79,0.4);   color: var(--text-sub); }
  .status-progress { background: rgba(201,168,76,0.15); color: var(--gold); }
  .status-done     { background: rgba(39,174,96,0.15);  color: #5cb85c; }
  .queue-item-actions { display: flex; gap: 8px; }
  .act-btn { flex: 1; padding: 7px 0; border-radius: 7px; font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-sub); transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .act-btn.primary { border-color: var(--gold); color: var(--gold); }
  .act-btn.primary:active { background: rgba(201,168,76,0.1); }
  .act-btn.success { border-color: #5cb85c; color: #5cb85c; }
  .act-btn.success:active { background: rgba(92,184,92,0.1); }

  .log-item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .log-badge { font-size: 13px; font-weight: 700; color: var(--text-sub); min-width: 60px; letter-spacing: 0.06em; }
  .log-detail { flex: 1; }
  .log-svc { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .log-meta { font-size: 11px; color: var(--text-dim); }

  .alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; text-align: center; display: none; }
  .alert-gold { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); }

  .svc-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .svc-block-title { font-size: 12px; color: var(--gold); font-weight: 500; letter-spacing: 0.08em; }
  .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,0.08); gap: 12px; }
  .settings-row:last-child { border-bottom: none; padding-bottom: 0; }
  .settings-key { font-size: 13px; color: var(--text-sub); }
  .settings-val { font-size: 13px; border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; background: var(--surface2); color: var(--text); font-family: inherit; text-align: right; }
  .settings-val:focus { outline: none; border-color: var(--gold); }
  .name-input { width: 100%; font-size: 14px; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; background: var(--surface); color: var(--text); font-family: inherit; margin-bottom: 16px; }
  .name-input:focus { outline: none; border-color: var(--gold); }
  .save-btn { width: 100%; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; background: var(--gold); color: var(--dark); border: none; margin-top: 8px; }
  .change-pw-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }

  .qr-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 10px; }
  .qr-block-title { font-size: 12px; color: var(--gold); font-weight: 500; letter-spacing: 0.08em; margin-bottom: 16px; }
  .qr-url { font-size: 12px; color: var(--text-sub); margin-top: 12px; word-break: break-all; }
  #qr-container { display: inline-block; background: white; padding: 10px; border-radius: 8px; }

  .empty-msg { font-size: 13px; color: var(--text-dim); padding: 12px 0; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 440px; padding: 20px 16px 20px; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); height: calc(100svh - 80px); max-height: 680px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-shrink: 0; }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .modal-close { font-size: 20px; color: var(--text-dim); cursor: pointer; background: none; border: none; line-height: 1; }

  /* 篩選 tabs */
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; flex-shrink: 0; }
  .filter-tab { font-size: 11px; font-family: inherit; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-sub); cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap; }
  .filter-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 600; }

  /* 自由查詢 */
  .date-range { display: none; gap: 8px; align-items: center; margin-bottom: 14px; flex-shrink: 0; }
  .date-range.show { display: flex; }
  .date-input { flex: 1; font-size: 12px; border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; background: var(--surface2); color: var(--text); font-family: inherit; }
  .date-input:focus { outline: none; border-color: var(--gold); }
  .date-search-btn { font-size: 12px; font-family: inherit; padding: 6px 14px; border-radius: 7px; background: var(--gold); color: var(--dark); border: none; cursor: pointer; font-weight: 600; white-space: nowrap; }

  /* modal 內容可滾動 */
  .modal-body { flex: 1; overflow-y: auto; }

  /* 統計列 */
  .log-summary { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; flex-shrink: 0; }
  .log-summary span { color: var(--gold); font-weight: 500; }

  /* 換頁 */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding-top: 14px; flex-shrink: 0; }
  .page-btn { font-size: 13px; font-family: inherit; padding: 6px 16px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text-sub); cursor: pointer; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-btn:not(:disabled):active { background: var(--surface2); }
  .page-info { font-size: 12px; color: var(--text-dim); }
</style>

<body>

<div class="overlay" id="loading-screen">
  <div class="spinner"></div>
  <div class="overlay-label">載入中...</div>
</div>

<div id="login-screen">
  <div class="login-logo">
    <div class="login-logo-text">叫號系統</div>
    <div class="login-logo-sub">店員登入</div>
  </div>
  <div class="login-field">
    <label>電子郵件</label>
    <input type="email" id="login-email" placeholder="your@email.com" autocomplete="username">
  </div>
  <div class="login-field">
    <label>密碼</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="login-btn" onclick="doLogin()">登入</button>
  <div class="login-error" id="login-error"></div>
  <span class="forgot-link" onclick="doForgotPassword()">忘記密碼？寄送重設信</span>
</div>

<div id="main-app">
  <div class="user-bar">
    <span class="user-email" id="user-email-display"></span>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('staff',this)">叫號操作</button>
    <button class="nav-btn" onclick="showPage('qrcode',this)">QR Code</button>
    <button class="nav-btn" onclick="showPage('settings',this)">設定</button>
  </div>

  <!-- 叫號操作 -->
  <div id="page-staff" class="page active">
    <div id="alert-staff" class="alert alert-gold"></div>
    <div class="hero">
      <div class="hero-eyebrow">目前叫到號碼</div>
      <div class="hero-num" id="current-display">---</div>
      <div class="hero-sub" id="current-svc-display">尚未開始叫號</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">等待人數</div><div class="stat-val" id="waiting-count">0</div></div>
      <div class="stat clickable" onclick="showTodayLog()">
        <div class="stat-label">今日發出</div>
        <div class="stat-val" id="total-issued">0</div>
        <div class="stat-hint">點擊查看明細</div>
      </div>
    </div>
    <button class="btn btn-gold" onclick="callNext()">叫下一號</button>
    <div class="divider"></div>
    <div class="section-label">等待中</div>
    <div id="queue-list"><p class="empty-msg">目前無人等待</p></div>
    <div class="divider"></div>
    <button class="btn btn-danger" onclick="resetAll()">重置今日號碼</button>
  </div>

  <!-- QR Code -->
  <div id="page-qrcode" class="page">
    <div class="qr-block">
      <div class="qr-block-title">客人取號頁面</div>
      <div id="qr-container"></div>
      <div class="qr-url" id="qr-url-text"></div>
    </div>
    <button class="btn" onclick="copyCustomerUrl()">複製客人網址</button>
    <div id="alert-qr" class="alert alert-gold"></div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.7;padding:4px 0;">將此 QR Code 截圖後印出貼在攤位上，客人掃描即可自助取號及查看即時叫號。</div>
  </div>

  <!-- 設定 -->
  <div id="page-settings" class="page">
    <div id="alert-settings" class="alert alert-gold"></div>
    <div class="section-label">店家名稱</div>
    <input class="name-input" id="shop-name-input" type="text" value="飾品工作室" placeholder="輸入店家名稱">
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="section-label" style="margin-bottom:0;">服務項目</span>
      <button onclick="addService()" style="font-size:12px;font-weight:500;font-family:inherit;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;color:var(--gold);cursor:pointer;">＋ 新增</button>
    </div>
    <div id="svc-settings"></div>
    <div class="divider"></div>
    <div class="section-label">其他設定</div>
    <div class="svc-block">
      <div class="settings-row">
        <span class="settings-key">號碼牌起始號碼</span>
        <input class="settings-val" type="number" id="start-num" value="1" min="1" style="width:70px;">
      </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">儲存設定</button>
    <div class="divider"></div>
    <div class="section-label">帳號安全</div>
    <div class="change-pw-block">
      <div class="settings-row">
        <span class="settings-key">重設密碼</span>
        <button class="logout-btn" onclick="doSendPasswordReset()">寄送重設信</button>
      </div>
    </div>
  </div>
</div>

<!-- 明細 Modal -->
<div class="modal-overlay" id="modal-log">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">叫號明細</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <!-- 篩選 tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('today',this)">今日</button>
      <button class="filter-tab" onclick="setFilter('yesterday',this)">昨日</button>
      <button class="filter-tab" onclick="setFilter('week',this)">本週</button>
      <button class="filter-tab" onclick="setFilter('month',this)">本月</button>
      <button class="filter-tab" onclick="setFilter('year',this)">今年</button>
      <button class="filter-tab" onclick="setFilter('all',this)">全部</button>
      <button class="filter-tab" onclick="setFilter('custom',this)">自訂</button>
    </div>
    <!-- 自訂日期範圍 -->
    <div class="date-range" id="date-range">
      <input class="date-input" type="date" id="date-from">
      <span style="color:var(--text-dim);font-size:12px;">—</span>
      <input class="date-input" type="date" id="date-to">
      <button class="date-search-btn" onclick="applyCustomRange()">查詢</button>
    </div>
    <!-- 統計 -->
    <div class="log-summary" id="log-summary"></div>
    <!-- 列表 -->
    <div class="modal-body" id="modal-log-content"></div>
    <!-- 換頁 -->
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
var CUSTOMER_URL = 'https://ticketingkiosk.timangeladream.com/customer.html';
var _qrDrawn = false;

function drawQR() {
  if (_qrDrawn) return;
  document.getElementById('qr-url-text').textContent = CUSTOMER_URL;
  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  script.onload = function() {
    new QRCode(document.getElementById('qr-container'), {
      text: CUSTOMER_URL, width: 200, height: 200,
      colorDark: '#1A1A18', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H
    });
    _qrDrawn = true;
  };
  document.head.appendChild(script);
}

window.copyCustomerUrl = function() {
  navigator.clipboard.writeText(CUSTOMER_URL).then(function(){ showAlert('alert-qr','網址已複製！'); });
};

window.closeModal = function() {
  document.getElementById('modal-log').classList.remove('show');
};
document.getElementById('modal-log').addEventListener('click', function(e) {
  if (e.target === this) window.closeModal();
});
</script>

async function checkDayRollover() {
  var today = todayStr();

  // 從 Firebase 讀取上次記錄的日期（跨裝置同步）
  var metaRef  = ref(db, 'queueMeta/lastDate');
  var metaSnap = await get(metaRef);
  var lastDate = metaSnap.val();

  if (!lastDate) {
    // 第一次使用，直接設定今天
    await set(metaRef, today);
    return;
  }
  if (lastDate === today) return;

  // 日期不同 → 從 Firebase 讀取資料封存
  var snap = await get(stateRef);
  var d = snap.val();
  if (d) {
    var queueItems  = d.queue    ? Object.values(d.queue)    : [];
    var doneItems   = d.doneList ? Object.values(d.doneList) : [];
    var allItems    = queueItems.concat(doneItems);
    var totalIssued = d.totalIssued || 0;

    if (allItems.length > 0 || totalIssued > 0) {
      var histDayRef = ref(db, 'history/' + lastDate);
      var existSnap  = await get(histDayRef);
      if (!existSnap.val()) {
        await set(histDayRef, { items: allItems, total: totalIssued });
      }
    }
  }

  // 清零今日 + 更新 Firebase 日期記錄
  await set(stateRef, {
    currentCalled: '---', currentSvc: '尚未開始叫號',
    totalIssued: 0, queue: null, doneList: null, allLog: null,
    counters: window._services.map(function(){ return 0; }), ts: Date.now()
  });
  await set(metaRef, today);
}

// ── AUTH ─────────────────────────────────────────────────
onAuthStateChanged(auth, async function(user) {
  document.getElementById('loading-screen').style.display = 'none';
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display     = 'block';
    document.getElementById('user-email-display').textContent = user.email;
    await checkDayRollover();
    startListening();
  } else {
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('main-app').style.display     = 'none';
  }
});

window.doLogin = async function() {
  var email = document.getElementById('login-email').value.trim();
  var pw    = document.getElementById('login-password').value;
  var errEl = document.getElementById('login-error');
  errEl.textContent = ''; errEl.style.color = '#e05c4f';
  if (!email || !pw) { errEl.textContent = '請輸入電子郵件和密碼'; return; }
  try { await signInWithEmailAndPassword(auth, email, pw); }
  catch(e) {
    var msg = '登入失敗，請確認帳號和密碼';
    if (e.code==='auth/too-many-requests') msg = '登入嘗試次數過多，請稍後再試';
    errEl.textContent = msg;
  }
};
window.doLogout = async function() {
  if (!confirm('確定要登出嗎？')) return;
  await signOut(auth);
};
window.doForgotPassword = async function() {
  var email = document.getElementById('login-email').value.trim();
  var errEl = document.getElementById('login-error');
  if (!email) { errEl.textContent = '請先輸入電子郵件'; return; }
  try {
    await sendPasswordResetEmail(auth, email);
    errEl.style.color = 'var(--gold)'; errEl.textContent = '重設密碼信已寄出，請檢查信箱';
  } catch(e) { errEl.textContent = '寄送失敗，請確認電子郵件是否正確'; }
};
window.doSendPasswordReset = async function() {
  try {
    await sendPasswordResetEmail(auth, auth.currentUser.email);
    showAlert('alert-settings','重設密碼信已寄出，請檢查信箱');
  } catch(e) { showAlert('alert-settings','寄送失敗，請稍後再試'); }
};

// ── FIREBASE LISTEN ──────────────────────────────────────
function startListening() {
  onValue(stateRef, function(snap) {
    var d = snap.val(); if (!d) return;
    window._currentCalled = d.currentCalled || '---';
    window._currentSvc    = d.currentSvc    || '尚未開始叫號';
    window._totalIssued   = d.totalIssued   || 0;
    window._queue         = d.queue    ? Object.values(d.queue)    : [];
    window._doneList      = d.doneList ? Object.values(d.doneList) : [];
    if (d.counters) d.counters.forEach(function(c,i){ if(window._services[i]) window._services[i].counter=c; });
    renderStaff();
  });
  onValue(settingsRef, function(snap) {
    var d = snap.val(); if (!d) return;
    window._shopName = d.shopName || '飾品工作室';
    document.getElementById('shop-name-input').value = window._shopName;
    if (d.services) d.services.forEach(function(s,i){ if(window._services[i]){ window._services[i].name=s.name; window._services[i].prefix=s.prefix; window._services[i].mins=s.mins; }});
    if (d.startNum) document.getElementById('start-num').value = d.startNum;
  });
}

function pushState() {
  set(stateRef, {
    currentCalled: window._currentCalled, currentSvc: window._currentSvc,
    totalIssued:   window._totalIssued,
    queue:         window._queue.length    ? window._queue    : null,
    doneList:      window._doneList.length ? window._doneList : null,
    counters:      window._services.map(function(s){ return s.counter; }),
    ts:            Date.now()
  });
}

// ── STATUS ───────────────────────────────────────────────
function statusTag(st) {
  if (st==='progress') return '<span class="status-tag status-progress">處理中</span>';
  if (st==='done')     return '<span class="status-tag status-done">已完成</span>';
  return '<span class="status-tag status-waiting">等待中</span>';
}

window.startProgress = function(idx) {
  if (!window._queue[idx]) return;
  window._queue[idx].status = 'progress';
  // 同時更新目前叫到號碼
  window._currentCalled = window._queue[idx].id;
  window._currentSvc    = window._queue[idx].name;
  pushState();
};
window.markDone = function(idx) {
  if (!window._queue[idx]) return;
  var item = window._queue.splice(idx,1)[0];
  item.status = 'done'; item.doneTime = nowTime(); item.date = todayStr();
  window._doneList.push(item);
  pushState();
};

// ── RENDER STAFF ─────────────────────────────────────────
function renderStaff() {
  document.getElementById('current-display').textContent     = window._currentCalled;
  document.getElementById('current-svc-display').textContent = window._currentSvc;
  document.getElementById('total-issued').textContent        = window._totalIssued;
  document.getElementById('waiting-count').textContent       = window._queue.length;
  var el = document.getElementById('queue-list');
  if (!window._queue.length) { el.innerHTML='<p class="empty-msg">目前無人等待</p>'; return; }
  el.innerHTML = window._queue.map(function(item,idx) {
    var st = item.status||'waiting';
    var actions = st==='waiting'
      ? '<button class="act-btn primary" onclick="startProgress('+idx+')">開始處理</button>'
      : st==='progress'
        ? '<button class="act-btn success" onclick="markDone('+idx+')">標記完成</button>'
        : '';
    return '<div class="queue-item">'
      +'<div class="queue-item-top"><span class="queue-badge">'+item.id+'</span><span class="queue-svc">'+item.name+'</span>'+statusTag(st)+'</div>'
      +(actions?'<div class="queue-item-actions">'+actions+'</div>':'')
      +'</div>';
  }).join('');
}

// ── MAIN ACTIONS ─────────────────────────────────────────
window.callNext = function() {
  if (!window._queue.length) { showAlert('alert-staff','目前沒有等待的號碼'); return; }
  var next = null;
  for (var i=0;i<window._queue.length;i++) {
    if (!window._queue[i].status || window._queue[i].status==='waiting') { next=window._queue[i]; break; }
  }
  if (!next) { showAlert('alert-staff','所有號碼均處理中'); return; }
  window._currentCalled=next.id; window._currentSvc=next.name;
  next.status='progress';
  pushState();
  showAlert('alert-staff','已叫號：'+next.id+'　'+next.name);
};

window.resetAll = function() {
  if (!confirm('確定要重置今日所有號碼嗎？')) return;
  window._queue=[]; window._doneList=[]; window._totalIssued=0;
  window._currentCalled='---'; window._currentSvc='尚未開始叫號';
  window._services.forEach(function(s){ s.counter=0; });
  pushState();
};

// ── 明細查詢 ─────────────────────────────────────────────
window.showTodayLog = async function() {
  _filterMode = 'today'; _currentPage = 1;
  document.querySelectorAll('.filter-tab').forEach(function(t,i){ t.classList.toggle('active', i===0); });
  document.getElementById('date-range').classList.remove('show');
  document.getElementById('modal-log').classList.add('show');
  await loadAndRenderLog();
};

window.setFilter = function(mode, btn) {
  _filterMode = mode; _currentPage = 1;
  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  if (mode==='custom') {
    document.getElementById('date-range').classList.add('show');
    var today = todayStr();
    document.getElementById('date-from').value = today;
    document.getElementById('date-to').value   = today;
    _filteredLogs = [];
    renderModalPage();
    return;
  }
  document.getElementById('date-range').classList.remove('show');
  loadAndRenderLog();
};

window.applyCustomRange = function() {
  _customFrom = document.getElementById('date-from').value;
  _customTo   = document.getElementById('date-to').value;
  _currentPage = 1;
  loadAndRenderLog();
};

async function loadAndRenderLog() {
  var today = todayStr();
  // 今日資料：從 queue + doneList 取
  var todayItems = window._queue.concat(window._doneList).map(function(item) {
    return Object.assign({}, item, { date: item.date || today });
  });

  var allItems = [];

  if (_filterMode === 'today') {
    allItems = todayItems;
  } else {
    // 從 history 讀取
    var snap = await get(historyRef);
    var histData = snap.val() || {};
    var histItems = [];
    Object.keys(histData).forEach(function(dateKey) {
      var dayItems = histData[dateKey].items ? Object.values(histData[dateKey].items) : [];
      dayItems.forEach(function(item){ histItems.push(Object.assign({}, item, { date: dateKey })); });
    });

    var now  = new Date();
    var from = null, to = null;

    if (_filterMode === 'yesterday') {
      var y = new Date(now); y.setDate(y.getDate()-1);
      var yd = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
      allItems = histItems.filter(function(i){ return i.date===yd; });
    } else if (_filterMode === 'week') {
      var dow = now.getDay()||7;
      var mon = new Date(now); mon.setDate(mon.getDate()-(dow-1));
      from = mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
      to   = today;
      allItems = histItems.filter(function(i){ return i.date>=from && i.date<=to; }).concat(todayItems);
    } else if (_filterMode === 'month') {
      from = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
      to   = today;
      allItems = histItems.filter(function(i){ return i.date>=from && i.date<=to; }).concat(todayItems);
    } else if (_filterMode === 'year') {
      from = now.getFullYear()+'-01-01';
      to   = today;
      allItems = histItems.filter(function(i){ return i.date>=from && i.date<=to; }).concat(todayItems);
    } else if (_filterMode === 'all') {
      allItems = histItems.concat(todayItems);
    } else if (_filterMode === 'custom') {
      from = _customFrom; to = _customTo;
      if (!from || !to) return;
      if (from > to) { var tmp=from; from=to; to=tmp; }
      var customItems = from===today||to===today ? histItems.concat(todayItems) : histItems;
      allItems = customItems.filter(function(i){ return i.date>=from && i.date<=to; });
    }
  }

  // 排序：最新在上（先按日期，再按 id）
  allItems.sort(function(a,b){
    if (b.date !== a.date) return b.date > a.date ? 1 : -1;
    return b.id > a.id ? 1 : -1;
  });

  _filteredLogs = allItems;
  renderModalPage();
}

function renderModalPage() {
  var total = _filteredLogs.length;
  var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (_currentPage > totalPages) _currentPage = totalPages;

  var start = (_currentPage-1) * PAGE_SIZE;
  var pageItems = _filteredLogs.slice(start, start+PAGE_SIZE);

  // 統計
  var done = _filteredLogs.filter(function(i){ return i.status==='done'; }).length;
  document.getElementById('log-summary').innerHTML =
    '共 <span>'+total+'</span> 筆　已完成 <span>'+done+'</span> 筆　等待/處理中 <span>'+(total-done)+'</span> 筆';

  // 列表
  var el = document.getElementById('modal-log-content');
  if (!pageItems.length) { el.innerHTML='<p class="empty-msg">此區間無記錄</p>'; }
  else {
    el.innerHTML = pageItems.map(function(item) {
      var st = item.status||'waiting';
      var meta = (item.date ? item.date+'　' : '')+'取號 '+(item.time||'--:--');
      if (item.doneTime) meta += '　完成 '+item.doneTime;
      return '<div class="log-item">'
        +'<span class="log-badge">'+item.id+'</span>'
        +'<div class="log-detail"><div class="log-svc">'+item.name+'</div><div class="log-meta">'+meta+'</div></div>'
        +statusTag(st)
        +'</div>';
    }).join('');
  }

  // 換頁
  var pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML=''; return; }
  pg.innerHTML =
    '<button class="page-btn" onclick="changePage(-1)" '+((_currentPage<=1)?'disabled':'')+'>‹ 上一頁</button>'
    +'<span class="page-info">'+_currentPage+' / '+totalPages+'</span>'
    +'<button class="page-btn" onclick="changePage(1)" '+((_currentPage>=totalPages)?'disabled':'')+'>下一頁 ›</button>';
}

window.changePage = function(dir) {
  _currentPage += dir;
  renderModalPage();
  document.getElementById('modal-log-content').scrollTop = 0;
};

// ── SETTINGS ─────────────────────────────────────────────
function syncFromSettings() {
  document.querySelectorAll('.svc-name-inp').forEach(function(el,i){ if(window._services[i]) window._services[i].name=el.value||window._services[i].name; });
  document.querySelectorAll('.svc-prefix-inp').forEach(function(el,i){ if(window._services[i]) window._services[i].prefix=(el.value||window._services[i].prefix).toUpperCase(); });
  document.querySelectorAll('.svc-time-inp').forEach(function(el,i){ if(window._services[i]) window._services[i].mins=parseInt(el.value)||window._services[i].mins; });
}

function renderSvcSettings() {
  document.getElementById('svc-settings').innerHTML = window._services.map(function(svc,i){
    return '<div class="svc-block">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
      +'<span class="svc-block-title">服務 '+(i+1)+'</span>'
      +(window._services.length>1
        ? '<button onclick="removeService('+i+')" style="font-size:11px;font-family:inherit;background:none;border:1px solid rgba(192,57,43,0.3);border-radius:6px;padding:3px 10px;color:#e05c4f;cursor:pointer;">刪除</button>'
        : '')
      +'</div>'
      +'<div class="settings-row"><span class="settings-key">服務名稱</span><input class="settings-val svc-name-inp" type="text" value="'+svc.name+'" style="width:140px;text-align:left;"></div>'
      +'<div class="settings-row"><span class="settings-key">號碼前綴</span><input class="settings-val svc-prefix-inp" type="text" maxlength="3" value="'+svc.prefix+'" style="width:60px;"></div>'
      +'<div class="settings-row"><span class="settings-key">等待時間（分鐘）</span><input class="settings-val svc-time-inp" type="number" min="1" value="'+svc.mins+'" style="width:70px;"></div>'
      +'</div>';
  }).join('');
}

window.addService = function() {
  syncFromSettings();
  window._services.push({ name: '新服務', prefix: 'X', mins: 20, counter: 0 });
  renderSvcSettings();
};
window.removeService = function(i) {
  syncFromSettings();
  if (window._services.length<=1) return;
  if (!confirm('確定刪除「'+window._services[i].name+'」？')) return;
  window._services.splice(i,1);
  renderSvcSettings();
};
window.saveSettings = function() {
  syncFromSettings();
  window._shopName = document.getElementById('shop-name-input').value || '飾品工作室';
  set(settingsRef, { shopName: window._shopName, services: window._services, startNum: parseInt(document.getElementById('start-num').value)||1 });
  showAlert('alert-settings','設定已儲存');
};

window.showPage = function(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+name).classList.add('active'); btn.classList.add('active');
  if (name==='settings') renderSvcSettings();
  if (name==='qrcode') drawQR();
};

window.showAlert = function(id, msg) {
  var el = document.getElementById(id);
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(function(){ el.style.display='none'; },3000);
};
function showAlert(id, msg) { window.showAlert(id, msg); }
</script>
