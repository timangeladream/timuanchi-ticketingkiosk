<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>取號｜叫號系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root {
    --gold: #C9A84C; --dark: #1A1A18; --surface: #242420; --surface2: #2E2E2A;
    --border: rgba(201,168,76,0.18); --text: #F0EDE6; --text-sub: #9A9488; --text-dim: #5A574F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

  .overlay { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-label { font-size: 13px; color: var(--text-sub); letter-spacing: 0.06em; }

  .nav { display: flex; border-bottom: 1px solid var(--border); background: var(--dark); position: sticky; top: 0; z-index: 10; }
  .nav-btn { flex: 1; padding: 14px 2px 12px; font-size: 12px; font-family: inherit; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-sub); cursor: pointer; letter-spacing: 0.04em; transition: color 0.2s, border-color 0.2s; }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }

  .page { display: none; padding: 20px 16px 40px; }
  .page.active { display: block; }
  .section-label { font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* LIVE */
  .live-hero { text-align: center; padding: 32px 0 24px; }
  .live-label { font-size: 11px; letter-spacing: 0.16em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .live-num { font-size: 88px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: 0.06em; text-shadow: 0 0 40px rgba(201,168,76,0.15); }
  .live-svc { font-size: 13px; color: var(--text-sub); margin-top: 8px; }
  .live-waiting { display: inline-block; margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 20px; font-size: 13px; color: var(--text-sub); }
  .live-waiting span { color: var(--text); font-weight: 700; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--gold); margin-right: 6px; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .queue-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .queue-badge { font-size: 13px; font-weight: 700; color: var(--gold); min-width: 60px; letter-spacing: 0.06em; }
  .queue-svc { font-size: 13px; color: var(--text); flex: 1; }
  .status-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; border-radius: 4px; padding: 2px 7px; }
  .status-waiting  { background: rgba(90,87,79,0.4);   color: var(--text-sub); }
  .status-progress { background: rgba(201,168,76,0.15); color: var(--gold); }
  .status-done     { background: rgba(39,174,96,0.15);  color: #5cb85c; }
  .empty-msg { font-size: 13px; color: var(--text-dim); padding: 12px 0; }

  /* SERVICE BUTTONS */
  .svc-btn { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.2s, background 0.2s; }
  .svc-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .svc-btn-left { display: flex; align-items: center; gap: 12px; }
  .svc-prefix { font-size: 11px; font-weight: 700; color: var(--dark); background: var(--gold); border-radius: 5px; padding: 3px 8px; min-width: 32px; text-align: center; }
  .svc-prefix.dim { background: var(--surface2); color: var(--text-sub); }
  .svc-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .svc-time { font-size: 12px; color: var(--text-sub); }
  .check-icon { font-size: 18px; color: var(--gold); opacity: 0; transition: opacity 0.2s; }
  .svc-btn.selected .check-icon { opacity: 1; }

  /* CONFIRM */
  .confirm-panel { display: none; margin-top: 6px; }
  .confirm-panel.show { display: block; }
  .confirm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,0.08); font-size: 14px; }
  .confirm-row:last-child { border-bottom: none; padding-bottom: 0; }
  .confirm-key { color: var(--text-sub); }
  .confirm-val { color: var(--text); font-weight: 500; }
  .confirm-val.gold { color: var(--gold); }

  .btn { width: 100%; padding: 15px; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); margin-bottom: 10px; letter-spacing: 0.04em; transition: background 0.15s; }
  .btn:active { background: var(--surface2); }
  .btn-gold { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 700; }
  .btn-gold:active { background: #b8933e; }
  .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TICKET CARD */
  .ticket-wrap { display: none; }
  .ticket-wrap.show { display: block; }
  .ticket-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 20px; text-align: center; margin-bottom: 16px; position: relative; overflow: hidden; transition: border-color 0.3s; }
  .ticket-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); transition: background 0.3s; }
  .ticket-card.progress { border-color: rgba(201,168,76,0.5); }
  .ticket-card.progress::before { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ticket-card.done { border-color: rgba(92,184,92,0.5); }
  .ticket-card.done::before { background: linear-gradient(90deg, transparent, #5cb85c, transparent); }
  .ticket-shop { font-size: 11px; letter-spacing: 0.14em; color: var(--text-sub); text-transform: uppercase; margin-bottom: 12px; }
  .ticket-num { font-size: 30px; font-weight: 700; color: var(--gold); line-height: 1; letter-spacing: 0.1em; }
  .ticket-svc { font-size: 13px; color: var(--text-sub); margin: 10px 0 4px; }
  .ticket-time { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
  .ticket-wait-row { display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 13px; color: var(--text-sub); margin-bottom: 14px; }
  .ticket-wait-val { font-size: 15px; font-weight: 700; color: var(--text); }
  .ticket-status-bar { border-top: 1px solid var(--border); padding-top: 14px; }
  .ticket-status-label { font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
  .ticket-status-val { font-size: 16px; font-weight: 700; }
  .ticket-status-val.waiting  { color: var(--text-sub); }
  .ticket-status-val.progress { color: var(--gold); }
  .ticket-status-val.done     { color: #5cb85c; }
</style>

<body>

<div class="overlay" id="loading-screen">
  <div class="spinner"></div>
  <div class="overlay-label">連線中...</div>
</div>

<div id="main-app" style="display:none;">
  <div class="nav" style="position:relative;">
    <button class="nav-btn active" onclick="showPage('take',this)">取號</button>
    <button class="nav-btn" onclick="showPage('live',this)">即時叫號</button>
    <button onclick="location.reload()" title="重新整理" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text-sub);cursor:pointer;font-size:14px;">↺</button>
  </div>

  <!-- 取號頁 -->
  <div id="page-take" class="page active">

    <!-- 號碼牌（取號後顯示） -->
    <div class="ticket-wrap" id="ticket-wrap">
      <div class="ticket-card" id="ticket-card">
        <div class="ticket-shop" id="ticket-shop-name">飾品工作室</div>
        <div class="ticket-num" id="ticket-num">---</div>
        <div class="ticket-svc" id="ticket-service">---</div>
        <div class="ticket-time" id="ticket-time">---</div>
        <div class="ticket-wait-row">
          <span>預估等待</span>
          <span class="ticket-wait-val" id="ticket-wait-time">---</span>
        </div>
        <div class="ticket-status-bar">
          <div class="ticket-status-label">目前狀態</div>
          <div class="ticket-status-val waiting" id="ticket-status-val">等待中</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);text-align:center;padding:0 8px 14px;line-height:1.7;">
        請保留此頁面不要關閉，可重新整理不影響您的號碼
      </div>
      <!-- 社群連結 -->
      <div id="shop-links" style="display:none;text-align:center;padding:16px 0 8px;border-top:1px solid var(--border);margin-bottom:10px;"></div>
      <button class="btn" onclick="resetTicket()">重新取號</button>
      <div class="divider"></div>
    </div>

    <!-- 選擇服務 -->
    <div id="step-select">
      <div class="section-label">選擇服務項目</div>
      <div id="service-buttons"></div>

      <!-- 確認面板 -->
      <div class="confirm-panel" id="confirm-panel">
        <div class="divider" style="margin-top:6px;"></div>
        <div class="section-label">確認取號</div>
        <div class="confirm-card">
          <div class="confirm-row"><span class="confirm-key">服務項目</span><span class="confirm-val" id="confirm-svc">---</span></div>
          <div class="confirm-row"><span class="confirm-key">目前等待人數</span><span class="confirm-val" id="confirm-queue">---</span></div>
          <div class="confirm-row"><span class="confirm-key">預估等待時間</span><span class="confirm-val gold" id="confirm-wait">---</span></div>
        </div>
        <button class="btn btn-gold" id="confirm-btn" onclick="confirmTicket()">確定取號</button>
        <button class="btn" onclick="cancelSelect()">取消</button>
      </div>
    </div>
  </div>

  <!-- 即時叫號頁 -->
  <div id="page-live" class="page">
    <div class="live-hero">
      <div class="live-label"><span class="dot"></span>即時叫號</div>
      <div class="live-num" id="live-current">---</div>
      <div class="live-svc" id="live-svc">尚未開始叫號</div>
      <div class="live-waiting">等待人數：<span id="live-waiting">0</span> 人</div>
    </div>
    <div class="divider"></div>
    <div class="section-label">等待中的號碼</div>
    <div id="live-queue-list"><p class="empty-msg">目前無人等待</p></div>
  </div>
</div>

<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMuP39XjBgFJo4TgKPRGKNESvcaHBkcUY",
  authDomain: "timuanchi-ticketingkiosk.firebaseapp.com",
  databaseURL: "https://timuanchi-ticketingkiosk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "timuanchi-ticketingkiosk",
  storageBucket: "timuanchi-ticketingkiosk.firebasestorage.app",
  messagingSenderId: "584986696218",
  appId: "1:584986696218:web:e8f464209ffe5ddaf68fa3"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const stateRef    = ref(db, 'queueState');
const settingsRef = ref(db, 'settings');

window._services = [
  { name: '改成耳夾',    prefix: 'E', mins: 20, counter: 0 },
  { name: '調整手鏈長度', prefix: 'B', mins: 20, counter: 0 },
  { name: '客製化款式',  prefix: 'C', mins: 45, counter: 0 }
];
window._queue          = [];
window._doneList       = [];
window._cancelledList  = [];
window._totalIssued    = 0;
window._currentCalled = '---';
window._currentSvc    = '尚未開始叫號';
window._shopName      = '飾品工作室';
window._shopIg        = '';
window._shopWebsite   = '';
window._selectedIdx   = -1;
window._myTicketId    = null; // 這位客人的號碼

function pad(n) { return String(n).padStart(3,'0'); }
function nowTime() {
  var d = new Date();
  var date = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var time = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  return date + ' ' + time;
}
function calcWait(svcIndex) {
  var total = 0;
  window._queue.forEach(function(item){ total += item.mins; });
  total += window._services[svcIndex].mins;
  return total;
}

// ── 找自己的票的狀態 ──────────────────────────────────────
function findMyTicketStatus(id) {
  if (!id) return null;
  // 先找等待中
  for (var i = 0; i < window._queue.length; i++) {
    if (window._queue[i].id === id) return window._queue[i].status || 'waiting';
  }
  // 再找已完成
  for (var j = 0; j < window._doneList.length; j++) {
    if (window._doneList[j].id === id) return 'done';
  }
  return null;
}

function updateMyTicketStatus() {
  var id = window._myTicketId;
  if (!id) return;
  var status = findMyTicketStatus(id);
  if (!status) return;
  var card  = document.getElementById('ticket-card');
  var valEl = document.getElementById('ticket-status-val');
  var btn   = document.querySelector('.ticket-wrap .btn');
  card.className = 'ticket-card ' + (status === 'waiting' ? '' : status);
  valEl.className = 'ticket-status-val ' + status;
  if (status === 'waiting') {
    valEl.textContent = '等待中';
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = '重新取號'; }
  }
  if (status === 'progress') {
    valEl.textContent = '處理中 ✦ 輪到您了！';
    if (btn) { btn.disabled = true; btn.style.opacity = '0.35'; btn.textContent = '處理中，無法重新取號'; }
  }
  if (status === 'done') {
    valEl.textContent = '已完成 ✓';
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = '重新取號'; }
  }
}

// ── Firebase 監聽 ─────────────────────────────────────────
onValue(stateRef, function(snap) {
  var d = snap.val();
  if (d) {
    window._currentCalled = d.currentCalled || '---';
    window._currentSvc    = d.currentSvc    || '尚未開始叫號';
    window._totalIssued   = d.totalIssued   || 0;
    window._queue         = d.queue         ? Object.values(d.queue)         : [];
    window._doneList      = d.doneList      ? Object.values(d.doneList)      : [];
    window._cancelledList = d.cancelledList ? Object.values(d.cancelledList) : [];
    if (d.counters) d.counters.forEach(function(c,i){ if(window._services[i]) window._services[i].counter=c; });
  }
  renderLive();
  renderServiceButtons();
  updateConfirmPanel();
  updateMyTicketStatus();
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';

  // 重新整理後恢復號碼牌
  var saved = sessionStorage.getItem('myTicket');
  if (saved && !document.getElementById('ticket-wrap').classList.contains('show')) {
    try {
      var t = JSON.parse(saved);
      window._myTicketId = t.id;
      document.getElementById('ticket-num').textContent       = t.id;
      document.getElementById('ticket-service').textContent   = t.name;
      document.getElementById('ticket-time').textContent      = '取號時間：' + t.time;
      document.getElementById('ticket-wait-time').textContent = t.wait + ' 分鐘';
      document.getElementById('ticket-wrap').classList.add('show');
      var stepEl = document.getElementById('step-select');
      if (stepEl) stepEl.innerHTML = '';
      updateMyTicketStatus();
    } catch(e) { sessionStorage.removeItem('myTicket'); }
  }
});

onValue(settingsRef, function(snap) {
  var d = snap.val(); if (!d) return;
  window._shopName    = d.shopName    || '飾品工作室';
  window._shopIg      = d.shopIg      || '';
  window._shopWebsite = d.shopWebsite || '';
  updateShopLinks();
  if (d.services) d.services.forEach(function(s,i){
    if(window._services[i]){ window._services[i].name=s.name; window._services[i].prefix=s.prefix; window._services[i].mins=s.mins; }
  });
  document.getElementById('ticket-shop-name').textContent = window._shopName;
  renderServiceButtons();
});

function updateShopLinks() {
  var block = document.getElementById('shop-links');
  if (!block) return;
  var ig  = window._shopIg;
  var web = window._shopWebsite;
  if (!ig && !web) { block.style.display = 'none'; return; }
  block.style.display = 'block';
  var html = '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;letter-spacing:0.06em;">🌸 等待時也可以逛逛</div>';
  html += '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">';
  if (ig) {
    var igUrl = ig.startsWith('http') ? ig : 'https://instagram.com/' + ig.replace('@','');
    html += '<a href="'+igUrl+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);text-decoration:none;font-size:13px;">'
      + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>'
      + ig + '</a>';
  }
  if (web) {
    var webUrl = web.startsWith('http') ? web : 'https://' + web;
    html += '<a href="'+webUrl+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);text-decoration:none;font-size:13px;">'
      + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>'
      + '官網</a>';
  }
  html += '</div>';
  block.innerHTML = html;
}

function renderLive() {
  document.getElementById('live-current').textContent = window._currentCalled;
  document.getElementById('live-svc').textContent     = window._currentSvc;
  document.getElementById('live-waiting').textContent = window._queue.length;
  var el = document.getElementById('live-queue-list');
  if (!window._queue.length) { el.innerHTML = '<p class="empty-msg">目前無人等待</p>'; return; }
  el.innerHTML = window._queue.map(function(item){
    var st = item.status || 'waiting';
    var stTag = '';
    if (st === 'progress') stTag = '<span class="status-tag status-progress">處理中</span>';
    return '<div class="queue-item">'
      +'<span class="queue-badge">'+item.id+'</span>'
      +'<span class="queue-svc">'+item.name+'</span>'
      +stTag
      +'</div>';
  }).join('');
}

function renderServiceButtons() {
  var el = document.getElementById('service-buttons');
  if (!el) return;
  el.innerHTML = window._services.map(function(svc,i){
    var sel = (window._selectedIdx === i);
    return '<div class="svc-btn'+(sel?' selected':'')+'" onclick="selectService('+i+')">'
      +'<div class="svc-btn-left">'
      +'<span class="svc-prefix'+(sel?'':' dim')+'">'+svc.prefix+'</span>'
      +'<span class="svc-name">'+svc.name+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<span class="svc-time">約 '+svc.mins+' 分鐘</span>'
      +'<span class="check-icon">✓</span>'
      +'</div></div>';
  }).join('');
}

function updateConfirmPanel() {
  if (window._selectedIdx < 0) return;
  var svc  = window._services[window._selectedIdx];
  var wait = calcWait(window._selectedIdx);
  document.getElementById('confirm-svc').textContent   = svc.name;
  document.getElementById('confirm-queue').textContent = window._queue.length + ' 人';
  document.getElementById('confirm-wait').textContent  = wait + ' 分鐘';
}

window.selectService = function(i) {
  window._selectedIdx = i;
  renderServiceButtons();
  updateConfirmPanel();
  document.getElementById('confirm-panel').classList.add('show');
};

window.cancelSelect = function() {
  window._selectedIdx = -1;
  renderServiceButtons();
  document.getElementById('confirm-panel').classList.remove('show');
};

window.confirmTicket = function() {
  var i = window._selectedIdx;
  if (i < 0) return;
  var btn = document.getElementById('confirm-btn');
  btn.disabled = true;

  var svc       = window._services[i];
  svc.counter++;
  var ticketId  = svc.prefix + '-' + pad(svc.counter);
  var totalWait = calcWait(i);
  var time      = nowTime();

  var today = new Date(); var dateStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  var newItem = { id: ticketId, name: svc.name, mins: svc.mins, svcIndex: i, time: time, status: 'waiting', date: dateStr };
  window._queue.push(newItem);
  window._totalIssued++;
  window._myTicketId = ticketId;

  // 只更新 queue、totalIssued、counters，不覆蓋其他店員資料
  update(stateRef, {
    totalIssued: window._totalIssued,
    queue:       window._queue,
    counters:    window._services.map(function(s){ return s.counter; }),
    ts:          Date.now()
  });

  // sessionStorage 保存
  sessionStorage.setItem('myTicket', JSON.stringify({
    id: ticketId, name: svc.name, time: time, wait: totalWait
  }));

  // 顯示號碼牌
  document.getElementById('ticket-shop-name').textContent = window._shopName;
  document.getElementById('ticket-num').textContent       = ticketId;
  document.getElementById('ticket-service').textContent   = svc.name;
  document.getElementById('ticket-time').textContent      = '取號時間：' + time;
  document.getElementById('ticket-wait-time').textContent = totalWait + ' 分鐘';
  document.getElementById('ticket-wrap').classList.add('show');
  // 刪除服務選擇區內容
  var stepEl = document.getElementById('step-select');
  if (stepEl) stepEl.innerHTML = '';
  updateMyTicketStatus();

  window._selectedIdx = -1;
  btn.disabled = false;
};

function buildAllLog() {
  // 合併 queue + doneList 成完整 allLog
  var log = [];
  window._queue.forEach(function(item){ log.push(item); });
  window._doneList.forEach(function(item){ log.push(item); });
  // 用 id 排序保持順序一致
  log.sort(function(a,b){ return a.id < b.id ? -1 : 1; });
  return log.length ? log : null;
}

function rebuildStepSelect() {
  var stepEl = document.getElementById('step-select');
  stepEl.innerHTML = '<div class="section-label">選擇服務項目</div>'
    + '<div id="service-buttons"></div>'
    + '<div class="confirm-panel" id="confirm-panel">'
    + '<div class="divider" style="margin-top:6px;"></div>'
    + '<div class="section-label">確認取號</div>'
    + '<div class="confirm-card">'
    + '<div class="confirm-row"><span class="confirm-key">服務項目</span><span class="confirm-val" id="confirm-svc">---</span></div>'
    + '<div class="confirm-row"><span class="confirm-key">目前等待人數</span><span class="confirm-val" id="confirm-queue">---</span></div>'
    + '<div class="confirm-row"><span class="confirm-key">預估等待時間</span><span class="confirm-val gold" id="confirm-wait">---</span></div>'
    + '</div>'
    + '<button class="btn btn-gold" id="confirm-btn" onclick="confirmTicket()">確定取號</button>'
    + '<button class="btn" onclick="cancelSelect()">取消</button>'
    + '</div>';
  window._selectedIdx = -1;
  renderServiceButtons();
}

window.resetTicket = function() {
  // 處理中狀態不允許重新取號
  var status = findMyTicketStatus(window._myTicketId);
  if (status === 'progress') {
    alert('您的號碼正在處理中，無法重新取號。');
    return;
  }
  if (!confirm('確定要取消目前的號碼並重新取號嗎？')) return;

  // 把原本的號碼標記為已取消，移到 cancelledList
  var id = window._myTicketId;
  if (id) {
    var cancelIdx = window._queue.findIndex(function(item){ return item.id === id; });
    if (cancelIdx !== -1) {
      var cancelledItem = window._queue.splice(cancelIdx, 1)[0];
      cancelledItem.status     = 'cancelled';
      cancelledItem.cancelTime = nowTime();
      window._cancelledList.push(cancelledItem);
    }
    // 只更新 queue 和 cancelledList，不覆蓋其他店員資料
    update(stateRef, {
      queue:         window._queue.length         ? window._queue         : null,
      cancelledList: window._cancelledList.length ? window._cancelledList : null,
      ts:            Date.now()
    });
  }

  sessionStorage.removeItem('myTicket');
  window._myTicketId = null;
  document.getElementById('ticket-wrap').classList.remove('show');
  document.getElementById('ticket-card').className = 'ticket-card';
  rebuildStepSelect();
};

window.showPage = function(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
};
</script>
<script>
function hardRefresh() {
  // 清除 Service Worker 快取後強制重新載入
  if ('caches' in window) {
    caches.keys().then(function(names) {
      names.forEach(function(name) { caches.delete(name); });
    }).then(function() {
      location.reload(true);
    });
  } else {
    location.reload(true);
  }
}
</script>
